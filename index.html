<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Document</title>
        <link rel="stylesheet" href="assets/style.css">
        <!-- Font awsome -->
        <link rel="stylesheet" href="assets/all.min.css">
        <!-- Hide firefox favicon error -->
        <link rel="shortcut icon" href="#">
    </head>
    <body>
        <div class="page">
            <aside>
                <h2>Categories</h2>
                <ul class="categories">
                    <li class="category">Work</li>
                    <li class="category">Personnel</li>
                    <li class="category">Shopping</li>
                </ul>
                <div class="category all-tasks active">All Tasks</div>
                <button class="btn-add add-category"><span>Add Category</span></button>
            </aside>
            <div class="right-page">
                <header>
                    <div>
                        <i class="fa-solid fa-bars"></i>
                        <h1>TaskFlow</h1>
                    </div>
                    <div class="search">
                        <input type="search" placeholder="Search Tasks...">
                    </div>
                </header>
                <main>
                    <div class="add-task">
                        <button class="btn-add new-task"><span>New Task</span></button>
                    </div>
                    <div class="tasks">
                        <div class="uncompleted-tasks">
                        </div>
                        <div class="completed-tasks">
                        </div>
                    </div>
                </main>
            </div>
            <div class="add-form">
                <div class="content">
                    <h3>New Task</h3>
                    <div class="task-name">
                        <label for="task-name">Name :</label>
                        <input type="text" id="task-name" placeholder="Task Name">
                    </div>
                    <div class="task-category">
                        <label for="task-category">Category :</label>
                        <select id="task-category">
                            <option value="work">Work</option>
                        </select>
                    </div>
                    <div class="buttons">
                        <button class="btn-add add">Add Task</button>
                        <button class="btn-add cancel">Cancel</button>
                    </div>
                </div>
            </div>
        </div>
        <script src="assets/main.js"></script>
    </body>
</html>
