<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Document</title>
        <link rel="stylesheet" href="assets/style.css">
        <!-- Font awsome -->
        <link rel="stylesheet" href="assets/all.min.css">
        <!-- Hide firefox favicon error -->
        <link rel="shortcut icon" href="#">
    </head>
    <body>
        <div class="page">
            <aside>
                <h2>Categories</h2>
                <ul class="categories">
                    <li class="category">Work</li>
                    <li class="category">Personnel</li>
                    <li class="category">Shopping</li>
                </ul>
                <div class="category all-tasks active">All Tasks</div>
                <button class="btn-add add-category"><span>Add Category</span></button>
            </aside>
            <div class="right-page">
                <header>
                    <div>
                        <i class="fa-solid fa-bars"></i>
                        <h1>TaskFlow</h1>
                    </div>
                    <div class="search">
                        <input type="search" placeholder="Search Tasks...">
                    </div>
                </header>
                <main>
                    <div class="add-task">
                        <button class="btn-add"><span>Add Task</span></button>
                    </div>
                    <div class="tasks">
                        <div class="all-tasks">
                            <h3>All Tasks</h3>
                            <div class="task">
                                <input type="checkbox">
                                <div class="info">
                                    <p>Go to the Gym</p>
                                    <span class="category">Personnel</span>
                                </div>
                            </div>
                            <div class="task">
                                <input type="checkbox">
                                <div class="info">
                                    <p>Buy vegitables</p>
                                    <span class="category">House</span>
                                </div>
                            </div>
                        </div>
                        <div class="completed-tasks">
                            <h3>Completed</h3>
                            <div class="task completed">
                                <input type="checkbox" checked>
                                <div class="info">
                                    <p>Reak a book</p>
                                    <span class="category">Personnel</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </main>
            </div>
        </div>
        <script src="assets/main.js"></script>
    </body>
</html>
