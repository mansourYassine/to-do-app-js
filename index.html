<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Document</title>
        <link rel="stylesheet" href="assets/style.css">
        <!-- Font awsome -->
        <link rel="stylesheet" href="assets/all.min.css">
    </head>
    <body>
        <div class="page">
            <aside>
                <div>
                    <a class="all-tasks">All Tasks</a>
                </div>
                <h3>categories</h3>
                <ul class="categories">
                    <li><a>Work</a></li>
                    <li><a>Personnel</a></li>
                    <li><a>Shopping</a></li>
                </ul>
                <button class="add-category"><i class="fa-solid fa-plus"></i>Add Category</button>
            </aside>
            <main>
                <div class="head">
                    <h1>TaskFlow</h1>
                    <input type="search" placeholder="Search">
                </div>
                <button class="add-task"><i class="fa-solid fa-plus"></i>Add Task</button>
                <div class="tasks">
                    <div class="task">
                        <input type="checkbox">
                        <p>Go to the Gym</p>
                        <span class="category">Personnel</span>
                    </div>
                    <div class="task">
                        <input type="checkbox">
                        <p>Buy vegitables</p>
                        <span class="category">House</span>
                    </div>
                    <div class="completed-tasks">
                        <h3>Completed</h3>
                        <div class="task completed">
                            <input type="checkbox" checked>
                            <p>Reak a book</p>
                            <span class="category">Personnel</span>
                        </div>
                    </div>
                </div>
            </main>
        </div>
        <script src="assets/main.js"></script>
    </body>
</html>
