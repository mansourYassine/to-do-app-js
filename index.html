<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Document</title>
        <link rel="stylesheet" href="assets/style.css">
        <!-- Font awsome -->
        <link rel="stylesheet" href="assets/all.min.css">
        <!-- Hide firefox favicon error -->
        <link rel="shortcut icon" href="#">
    </head>
    <body>
        <div class="page">
            <aside>
                <h2>Categories</h2>
                <ul class="categories">
                    <li class="category active">Work</li>
                    <li class="category">Personnel</li>
                    <li class="category">Shopping</li>
                </ul>
                <div class="category all-tasks">All Tasks</div>
                <div class="category completed">Completed</div>
                <button class="add-category">Add Category</button>
            </aside>
            <main>
                <div class="head">
                    <div>
                        <i class="fa-solid fa-bars"></i>
                        <h1>TaskFlow</h1>
                    </div>
                    <div class="search">
                        <input type="search" placeholder="Search Tasks...">
                    </div>
                </div>
                <button class="add-task"><i class="fa-solid fa-plus"></i>Add Task</button>
                <div class="tasks">
                    <div class="task">
                        <input type="checkbox">
                        <p>Go to the Gym</p>
                        <span class="category">Personnel</span>
                    </div>
                    <div class="task">
                        <input type="checkbox">
                        <p>Buy vegitables</p>
                        <span class="category">House</span>
                    </div>
                    <div class="completed-tasks">
                        <h3>Completed</h3>
                        <div class="task completed">
                            <input type="checkbox" checked>
                            <p>Reak a book</p>
                            <span class="category">Personnel</span>
                        </div>
                    </div>
                </div>
            </main>
        </div>
        <script src="assets/main.js"></script>
    </body>
</html>
